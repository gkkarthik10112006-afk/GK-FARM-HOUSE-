<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GK Farm House PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: 'Segoe UI'; background:#0f172a; color:white; margin:0;}
.header { display:flex; align-items:center; padding:15px; background:#020617;}
.header img { width:45px; margin-right:10px;}
.container { padding:15px;}

.cards { display:flex; gap:10px; flex-wrap:wrap;}
.card { flex:1; padding:15px; border-radius:12px; text-align:center;}
.profit{background:#065f46;}
.income{background:#92400e;}
.expense{background:#7f1d1d;}

input,select{
width:100%; padding:10px; margin:5px 0;
background:#1e293b; border:none; border-radius:8px; color:white;
}

button{
background:#2563eb; padding:10px; border:none;
border-radius:10px; width:100%; margin-top:10px;
}

table{width:100%; margin-top:20px; border-collapse:collapse;}
th,td{padding:10px; border-bottom:1px solid #1e293b; text-align:center;}
</style>
</head>

<body>

<div class="header">
<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png">
<h2>GK FARM HOUSE</h2>
</div>

<div class="container">

<div class="cards">
<div class="card profit">Net Profit<h2 id="profit">₹0</h2></div>
<div class="card income">Income<h2 id="income">₹0</h2></div>
<div class="card expense">Expenses<h2 id="expense">₹0</h2></div>
</div>

<canvas id="chart"></canvas>

<h3>Entries</h3>
<input type="date" id="date">
<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>
<input id="particulars" placeholder="Particulars">
<input id="qty" type="number" placeholder="Egg Qty">
<input id="price" type="number" placeholder="Price">
<input id="amount" readonly placeholder="Amount">
<button onclick="addEntry()">Add Entry</button>

<table>
<thead>
<tr>
<th>Date</th><th>Type</th><th>Particulars</th>
<th>Qty</th><th>Price</th><th>Amount</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<h3>Bird Management</h3>
<input id="totalBirds" placeholder="Total Birds">
<input id="adult" placeholder="Adults">
<input id="chicks" placeholder="Chicks">
<input id="mortality" placeholder="Mortality">
<input id="sale" placeholder="Sale">

<button onclick="downloadPDF()">Export Full Report</button>

</div>

<script>
let entries = JSON.parse(localStorage.getItem("entries")) || [];

let income=0, expense=0;

/* AUTO AMOUNT */
qty.oninput = price.oninput = () => {
amount.value = (qty.value * price.value) || 0;
};

/* ADD ENTRY */
function addEntry(){
if(!date.value || !particulars.value) return alert("Fill details");

let entry={
date:date.value,
type:type.value,
part:particulars.value,
qty:Number(qty.value),
price:Number(price.value),
amount:Number(amount.value)
};

entries.push(entry);
localStorage.setItem("entries", JSON.stringify(entries));

render();
}

/* CALCULATE + RENDER */
function render(){
income=0; expense=0;

entries.forEach(e=>{
if(e.type==="income") income+=e.amount;
else expense+=e.amount;
});

incomeEl.innerText="₹"+income;
expenseEl.innerText="₹"+expense;
profitEl.innerText="₹"+(income-expense);

/* TABLE */
tableBody.innerHTML="";
entries.forEach(e=>{
tableBody.innerHTML+=`
<tr>
<td>${e.date}</td>
<td>${e.type}</td>
<td>${e.part}</td>
<td>${e.qty}</td>
<td>${e.price}</td>
<td>${e.amount}</td>
</tr>`;
});

/* WEEKLY GRAPH */
let weeks={};

entries.forEach(e=>{
let week=new Date(e.date).getWeek();
if(!weeks[week]) weeks[week]={inc:0,exp:0};

if(e.type==="income") weeks[week].inc+=e.amount;
else weeks[week].exp+=e.amount;
});

chart.data.labels=Object.keys(weeks);
chart.data.datasets[0].data=Object.values(weeks).map(w=>w.inc);
chart.data.datasets[1].data=Object.values(weeks).map(w=>w.exp);
chart.update();
}

/* WEEK FUNCTION */
Date.prototype.getWeek=function(){
let d=new Date(this.getFullYear(),0,1);
return Math.ceil((((this-d)/86400000)+d.getDay()+1)/7);
};

let chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:[],
datasets:[
{label:"Income",data:[],backgroundColor:"black"},
{label:"Expenses",data:[],backgroundColor:"red"}
]
}
});

/* PDF */
function downloadPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.text("GK FARM HOUSE REPORT",20,20);

doc.text(`Income: ₹${income}`,20,40);
doc.text(`Expense: ₹${expense}`,20,50);
doc.text(`Profit: ₹${income-expense}`,20,60);

let y=80;
entries.forEach(e=>{
doc.text(`${e.date} ${e.type} ${e.part} ₹${e.amount}`,20,y);
y+=8;
});

doc.save("Farm_Report.pdf");
}

render();
</script>

</body>
</html>
